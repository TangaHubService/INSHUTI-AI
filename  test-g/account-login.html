    </header>
    <section class="section" style="max-width:400px; margin:0 auto;">

        <p style="font-size:12px; color:var(--ink-soft); margin-top:14px; text-align:center;">New here? <a href="register.html" style="color:var(--teal-700); font-weight:700;">Create an account</a></p>
